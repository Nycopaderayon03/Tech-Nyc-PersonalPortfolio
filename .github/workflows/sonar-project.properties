# SonarCloud project identification
# IMPORTANT: Replace YOUR_ORGANIZATION with your actual GitHub organization/username
sonar.projectKey=YOUR_ORGANIZATION_Tech-Nyc-PersonalPortfolio
sonar.organization=YOUR_ORGANIZATION

# Source directories to scan
sonar.sources=.

# Exclude unnecessary files
sonar.exclusions=**/node_modules/**,**/build/**,**/.*,README.md

# Encoding
sonar.sourceEncoding=UTF-8

# SonarCloud host URL
sonar.host.url=https://sonarcloud.io
